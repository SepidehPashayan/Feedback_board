<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود مدیریت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.16);
      --accent: #c8a96e;
      --text-primary: #f0eee8;
      --text-secondary: rgba(240,238,232,0.6);
      --error: #f87171;
    }

    html, body {
      height: 100%;
      font-family: 'Vazirmatn', sans-serif;
      color: var(--text-primary);
    }

    body {
      background:
        linear-gradient(135deg, rgba(15,10,40,0.85), rgba(10,20,50,0.88)),
        url('/static/images/background.png') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.2), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      animation: centerPulse 5s ease-in-out infinite;
    }

    @keyframes centerPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-header { text-align: center; margin-bottom: 2rem; }

    .shield-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #7c3aed, #1d4ed8);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
      box-shadow: 0 4px 24px rgba(124,58,237,0.45);
      animation: shieldGlow 3s ease-in-out infinite;
    }

    @keyframes shieldGlow {
      0%, 100% { box-shadow: 0 4px 24px rgba(124,58,237,0.45); }
      50%       { box-shadow: 0 4px 40px rgba(124,58,237,0.75), 0 0 0 8px rgba(124,58,237,0.1); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f0eee8, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-header p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.3rem; }

    .field { margin-bottom: 1.2rem; }

    label {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.85rem; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    label i { color: var(--accent); font-size: 0.8rem; }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      color: var(--text-primary);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    input::placeholder { color: rgba(240,238,232,0.28); }

    input:focus {
      border-color: rgba(200,169,110,0.5);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
    }

    .input-icon {
      position: absolute;
      left: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: rgba(200,169,110,0.5);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .toggle-pass {
      position: absolute;
      right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--accent); }

    .alert-error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--error);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-size: 0.88rem;
      display: flex; align-items: center; gap: 0.4rem;
      margin-bottom: 1.2rem;
      animation: alertIn 0.3s ease both;
    }

    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #7c3aed, #1d4ed8);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
      margin-top: 0.5rem;
    }

    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.5); filter: brightness(1.1); }
    .btn-login:active { transform: translateY(0); }

    .back-link {
      text-align: center;
      margin-top: 1.4rem;
    }

    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.84rem;
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      transition: color 0.2s, border-color 0.2s, transform 0.2s;
    }

    .back-link a:hover {
      color: var(--accent);
      border-color: rgba(200,169,110,0.35);
      transform: translateY(-2px);
    }

    .cursor-glow {
      position: fixed;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.1s ease, top 0.1s ease;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="card">
    <div class="card-header">
      <div class="shield-icon"><i class="fa-solid fa-shield-halved" style="color:#fff"></i></div>
      <h1>پنل مدیریت</h1>
      <p>برای ادامه وارد شوید</p>
    </div>

    {% if error %}
    <div class="alert-error">
      <i class="fa-solid fa-triangle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label><i class="fa-solid fa-user"></i> نام کاربری</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" name="username" placeholder="نام کاربری مدیر" required>
        </div>
      </div>

      <div class="field">
        <label><i class="fa-solid fa-lock"></i> رمز عبور</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" name="password" id="passInput" placeholder="••••••••" required>
          <i class="fa-solid fa-eye toggle-pass" id="togglePass" onclick="togglePassword()"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i>
        ورود به داشبورد
      </button>
    </form>

    <div class="back-link">
      <a href="/">
        <i class="fa-solid fa-arrow-right"></i>
        بازگشت به صفحه اصلی
      </a>
    </div>
  </div>

  <script>
    document.addEventListener('mousemove', e => {
      const g = document.getElementById('cursorGlow');
      g.style.left = e.clientX + 'px';
      g.style.top = e.clientY + 'px';
    });

    function togglePassword() {
      const input = document.getElementById('passInput');
      const icon = document.getElementById('togglePass');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash toggle-pass';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye toggle-pass';
      }
    }
  </script>
</body>
</html>
